[pytest]
# Pytest configuration for Hendrix Video Analysis Pipeline

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    
# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    gpu: marks tests that require GPU
    model: marks tests that require model downloads
    
# Coverage options (when running with pytest-cov)
# Usage: pytest --cov=components --cov-report=html
[coverage:run]
source = components
omit = 
    */tests/*
    */archive/*
    */__pycache__/*
    */venv/*
    
[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.: