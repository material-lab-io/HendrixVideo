name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 isort
    
    - name: Format check with Black
      run: black --check --line-length 120 components/ scripts/ tests/
    
    - name: Import sorting check with isort
      run: isort --check-only --profile black --line-length 120 components/ scripts/ tests/
    
    - name: Lint with flake8
      run: flake8 components/ scripts/ tests/ --max-line-length 120 --extend-ignore E203,W503
    
    - name: Check for absolute imports in components
      run: |
        # Check for absolute imports that should be relative
        if grep -r "^from \(models\|schemas\|utils\|pipeline\)\." components/; then
          echo "❌ Found absolute imports that should be relative imports!"
          echo "Please use relative imports (e.g., 'from ..models' instead of 'from models')"
          exit 1
        else
          echo "✅ All imports in components use relative imports correctly"
        fi

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Cache pip packages
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements/*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/base.txt
        pip install -r requirements/test.txt
    
    - name: Run tests
      run: |
        pytest tests/ -v --tb=short -m "not slow and not gpu and not model"
    
    - name: Verify installation and basic functionality
      run: |
        python -m hendrix_pipeline --verify
        python -m hendrix_pipeline --help
    
    - name: Generate coverage report
      if: matrix.python-version == '3.10'
      run: |
        pytest tests/ --cov=components --cov-report=xml -m "not slow and not gpu and not model"
    
    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.10'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
    
    - name: Security check with Safety
      run: safety check --file requirements/all.txt || true
    
    - name: Security check with Bandit
      run: bandit -r components/ scripts/ -ll